<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --somfy-yellow: #f3b400;
        --neutral: #ececec;
        --text: #111111;
        --muted: #6b7280;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      .wrap {
        height: 100%;
        box-sizing: border-box;
        padding: var(--homey-su-2);
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 8px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      select,
      .btn {
        border: none;
        border-radius: 10px;
        padding: 10px;
        background: var(--neutral);
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
      }

      .btn.primary {
        background: var(--somfy-yellow);
      }

      .stage {
        border-radius: 12px;
        overflow: hidden;
        background: #111;
        display: grid;
        place-items: center;
        min-height: 120px;
      }

      .stage img,
      .stage iframe {
        width: 100%;
        height: 100%;
        border: 0;
        object-fit: cover;
      }

      .empty {
        color: #fff;
        text-align: center;
        font-size: 12px;
        padding: 12px;
      }

      .hint {
        color: var(--muted);
        font-size: 11px;
        min-height: 14px;
      }

      .links {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .link {
        color: var(--text);
        font-size: 12px;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body class="homey-widget">
    <div class="wrap">
      <div class="toolbar">
        <select id="cameraSelect"></select>
        <button id="syncBtn" class="btn primary">Sync</button>
      </div>

      <div class="links">
        <a id="openLiveLink" class="link" href="#" target="_blank" rel="noopener noreferrer">Open Live</a>
        <span id="cameraState" class="hint"></span>
      </div>

      <div id="stage" class="stage">
        <div class="empty">No camera stream available</div>
      </div>
    </div>

    <script>
      let HomeyRef = null;
      let overview = { cameras: [] };
      let selectedExternalId = null;
      let refreshTimer = null;

      function getSelectedCamera() {
        return (overview.cameras || []).find(cam => cam.externalId === selectedExternalId) || null;
      }

      function updateStage() {
        const stage = document.getElementById('stage');
        const liveLink = document.getElementById('openLiveLink');
        const stateEl = document.getElementById('cameraState');
        const camera = getSelectedCamera();

        stage.innerHTML = '';

        if (!camera) {
          stage.innerHTML = '<div class="empty">No camera selected</div>';
          liveLink.style.visibility = 'hidden';
          stateEl.textContent = '';
          return;
        }

        stateEl.textContent = camera.motionDetected ? 'Motion detected' : 'Idle';

        if (camera.liveUrl) {
          liveLink.href = camera.liveUrl;
          liveLink.style.visibility = 'visible';
        } else {
          liveLink.href = '#';
          liveLink.style.visibility = 'hidden';
        }

        if (camera.snapshotUrl) {
          const img = document.createElement('img');
          img.alt = camera.name || 'Camera snapshot';
          const separator = camera.snapshotUrl.includes('?') ? '&' : '?';
          img.src = `${camera.snapshotUrl}${separator}t=${Date.now()}`;
          stage.appendChild(img);
          return;
        }

        if (camera.liveUrl) {
          const frame = document.createElement('iframe');
          frame.src = camera.liveUrl;
          frame.loading = 'lazy';
          stage.appendChild(frame);
          return;
        }

        stage.innerHTML = '<div class="empty">No camera stream available</div>';
      }

      function fillSelect() {
        const select = document.getElementById('cameraSelect');
        const cameras = overview.cameras || [];
        select.innerHTML = '';

        if (!cameras.length) {
          const option = document.createElement('option');
          option.value = '';
          option.textContent = 'No cameras found';
          select.appendChild(option);
          select.disabled = true;
          selectedExternalId = null;
          updateStage();
          return;
        }

        select.disabled = false;

        cameras.forEach(camera => {
          const option = document.createElement('option');
          option.value = camera.externalId;
          option.textContent = camera.name || camera.externalId;
          select.appendChild(option);
        });

        if (!selectedExternalId || !cameras.some(cam => cam.externalId === selectedExternalId)) {
          selectedExternalId = cameras[0].externalId;
        }

        select.value = selectedExternalId;
        updateStage();
      }

      async function loadCameras(syncNow = false) {
        try {
          overview = syncNow
            ? await HomeyRef.api('POST', '/sync', {})
            : await HomeyRef.api('GET', '/cameras', {});

          fillSelect();
        } catch (error) {
          console.error(error);
        }
      }

      function startAutoRefresh() {
        if (refreshTimer) {
          clearInterval(refreshTimer);
        }

        refreshTimer = setInterval(() => {
          loadCameras(false);
        }, 15000);
      }

      function onHomeyReady(Homey) {
        HomeyRef = Homey;

        document.getElementById('cameraSelect').addEventListener('change', event => {
          selectedExternalId = String(event.target.value || '');
          updateStage();
        });

        document.getElementById('syncBtn').addEventListener('click', () => loadCameras(true));

        loadCameras(false);
        startAutoRefresh();
        Homey.ready();
      }
    </script>
  </body>
</html>
